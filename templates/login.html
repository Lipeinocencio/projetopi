<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - CaroliExcursões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); height: 100vh; display: flex; align-items: center; }
        .card-login { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-success { background-color: #27ae60; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card card-login p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Bem-vindo(a)!</h2>
                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        {% for message in messages %}
                          <div class="alert alert-danger p-2 small text-center fw-bold rounded-3 mb-3" role="alert">
                            {{ message }}
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}
                    <p class="text-muted">Faça login para continuar</p>
                </div>
                <form action="/login" method="post">
                    <div class="mb-3">
                        <label class="form-label">Seu E-mail</label>
                        <input type="email" name="email" class="form-control" placeholder="email@exemplo.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Sua Senha</label>
                        <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold">Entrar</button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted small">Ainda não viaja conosco? <a href="/cadastro" class="text-decoration-none">Cadastre-se</a></span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
